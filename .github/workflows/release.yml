name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2.2.2)'
        required: true

env:
  RELEASES_REPO: synergy-network-hq/devnet-control-panel-releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64
            bundles: dmg
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux-x64
            bundles: deb
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64
            bundles: nsis

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
          key: ${{ matrix.target }}
          shared-key: release-${{ runner.os }}
          cache-workspace-crates: true
          cache-on-failure: true

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install --prefer-offline --no-audit --no-fund

      - name: Create .env if missing
        shell: bash
        run: |
          if [ ! -f .env ]; then
            echo "# CI placeholder — real values are set per-machine at runtime" > .env
          fi

      - name: Install Linux dependencies
        if: matrix.label == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1-dev

      - name: Build Tauri app (Unix)
        if: runner.os != 'Windows'
        run: npx tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Build Tauri app (Windows)
        if: runner.os == 'Windows'
        run: npx tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Collect artifacts (macOS)
        if: startsWith(matrix.label, 'macos')
        run: |
          mkdir -p artifacts
          cp src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg artifacts/ 2>/dev/null || true
          cd artifacts
          for f in *.dmg; do
            [ -f "$f" ] && mv "$f" "${f%.dmg}_${{ matrix.label }}.dmg" 2>/dev/null || true
          done
          cd ..
          ls -la artifacts/

      - name: Collect artifacts (Linux)
        if: matrix.label == 'linux-x64'
        run: |
          mkdir -p artifacts
          cp src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb artifacts/ 2>/dev/null || true
          ls -la artifacts/

      - name: Collect artifacts (Windows)
        if: matrix.label == 'windows-x64'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts
          Copy-Item "src-tauri\target\${{ matrix.target }}\release\bundle\nsis\*.exe" artifacts\ -ErrorAction SilentlyContinue
          Get-ChildItem artifacts\

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.label }}
          path: artifacts/*

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Determine version tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find all-artifacts -type f -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create GitHub Release on releases repo
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ env.RELEASES_REPO }}
          tag_name: ${{ steps.tag.outputs.version }}
          name: "Synergy Devnet Control Center ${{ steps.tag.outputs.version }}"
          body: |
            ## Synergy Devnet Control Center ${{ steps.tag.outputs.version }}

            Installer-only release (auto-updater artifacts are intentionally not included).

            ### Installers
            | Platform | Installer |
            |----------|-----------|
            | macOS (Apple Silicon) | `.dmg` |
            | Linux (x86_64) | `.deb` |
            | Windows (x86_64) | `.exe` (NSIS) |

            ---
            *Built from source commit ${{ github.sha }}*
          files: release-assets/*
          token: ${{ secrets.RELEASES_REPO_TOKEN }}
          draft: false
          prerelease: false
